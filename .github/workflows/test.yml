name: Test

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "custom_components/pypowerwall/translations/**"
      - "requirements*.txt"
      - "pytest.ini"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "**.py"
      - "custom_components/pypowerwall/translations/**"
      - "requirements*.txt"
      - "pytest.ini"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # pytest-homeassistant-custom-component==0.13.346 requires Python >=3.14,
        # so 3.13 (the ruff target-version baseline) can't be added here until
        # that pin moves.
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: python3 -m pytest --cov=custom_components/pypowerwall --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
